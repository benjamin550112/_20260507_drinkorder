name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 1: Clean reinstall (workaround for npm optional deps bug #4828)
      - name: Install dependencies (clean reinstall)
        run: |
          rm -f package-lock.json
          rm -rf node_modules
          npm install

      # Step 2: Explicitly install the Linux x64 native binding for @tailwindcss/oxide
      # npm often skips platform-specific optional packages; we force-install here.
      - name: Fix TailwindCSS native binding (Linux x64)
        run: npm install --save-dev @tailwindcss/oxide-linux-x64-gnu@4.3.0

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
