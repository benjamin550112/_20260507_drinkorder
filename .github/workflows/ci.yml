name: CI

# Trigger on any push or PR to any branch
on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  # ---------- Node.js Test (optional) ----------
  node-test:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[node]') || false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  # ---------- Python Test (optional) ----------
  python-test:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[python]') || false
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests (pytest)
        run: |
          if [ -f pytest.ini ] || [ -d tests ]; then pytest; else echo "No pytest configuration found"; fi

  # ---------- Clean up (optional) ----------
  cleanup:
    runs-on: ubuntu-latest
    needs: [node-test, python-test]
    steps:
      - uses: actions/checkout@v4
      - name: Clean up unnecessary files
        run: |
          echo "Add any clean‑up commands here, e.g. rm -rf __pycache__, node_modules/.cache, .tmp …"

  # ---------- Build & Deploy to GitHub Pages ----------
  deploy-pages:
    runs-on: ubuntu-latest
    needs: cleanup
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Add .nojekyll file
        run: touch dist/.nojekyll
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
